name: Build and Deplo

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Using Node 22 for better performance with Vite 8
          cache: 'npm' # Built-in caching for node_modules

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build # Vite outputs to the 'dist' folder by default

      - name: Deploy to Hostinger via SSH
        uses: easedy/ssh-deploy@main
        env:
          ARGS: "-rlgoDzvc --delete"
          SOURCE: "dist/" # Vite's default output
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          TARGET: "~/domains/joecodes.in/public_html" 
          EXCLUDE: "/node_modules/"